name: Update age in README

on:
  schedule:
    - cron: '0 3 * * *'   # täglich um 03:00 UTC
  workflow_dispatch:        # erlaubt manuelles Auslösen über den "Actions"-Tab

permissions:
  contents: write

jobs:
  update-age:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Alter berechnen und README aktualisieren
        env:
          BIRTHDATE: ${{ secrets.BIRTHDATE }}   # Format: YYYY-MM-DD, z.B. 2001-05-14
        run: |
          set -e
          IFS=- read -r by bm bd <<< "$BIRTHDATE"
          cy=$(date +%Y); cm=$(date +%m); cd=$(date +%d)
          age=$((10#$cy - 10#$by))
          if [ "$((10#$cm))" -lt "$((10#$bm))" ] || { [ "$((10#$cm))" -eq "$((10#$bm))" ] && [ "$((10#$cd))" -lt "$((10#$bd))" ]; }; then
            age=$((age - 1))
          fi
          sed -i -E "s/(<!--AGE-->)[0-9]+(<!--\/AGE-->)/\1${age}\2/" README.md

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update age" || exit 0
          git push
